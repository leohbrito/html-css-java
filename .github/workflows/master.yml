on:
  push:
    branches:
      - master

name: Deploy website on push

jobs:
  web-deploy:
    name: Build and deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: coolsolutions/package-lock.json

      - name: Install dependencies
        working-directory: coolsolutions
        run: npm ci

      - name: Build static site
        working-directory: coolsolutions
        run: npm run build

      - name: Verify static export
        run: |
          test -f coolsolutions/out/index.html
          test -f coolsolutions/out/404.html
          test -f coolsolutions/out/sitemap.xml

      - name: Install SFTP client
        run: |
          sudo apt-get update
          sudo apt-get install -y lftp

      - name: Deploy via SFTP
        env:
          FTP_SERVER: ${{ secrets.ftp_endpoint }}
          FTP_USERNAME: ${{ secrets.ftp_username }}
          FTP_PASSWORD: ${{ secrets.ftp_password }}
        run: |
          lftp <<EOF
          set sftp:auto-confirm yes
          set sftp:connect-program "ssh -a -x -o HostKeyAlgorithms=+ssh-rsa -o PubkeyAcceptedAlgorithms=+ssh-rsa"
          set net:timeout 20
          set net:max-retries 2
          open -u "$FTP_USERNAME","$FTP_PASSWORD" "sftp://$FTP_SERVER:22"
          mirror --reverse --only-newer --verbose ./coolsolutions/out/ public_html/
          mirror --reverse --only-newer --verbose ./coolsolutions/out/ public_html/workflows/
          bye
          EOF
