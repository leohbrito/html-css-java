on:
  push:
    branches:
      - master

name: Deploy website on push

jobs:
  web-deploy:
    name: Build and deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: coolsolutions/package-lock.json

      - name: Install dependencies
        working-directory: coolsolutions
        run: npm ci

      - name: Build static site
        working-directory: coolsolutions
        run: npm run build

      - name: Verify static export
        run: |
          test -f coolsolutions/out/index.html
          test -f coolsolutions/out/404.html
          test -f coolsolutions/out/sitemap.xml

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.ftp_endpoint }}
          username: ${{ secrets.ftp_username }}
          password: ${{ secrets.ftp_password }}
          protocol: ftp
          port: 21
          local-dir: ./coolsolutions/out/
          server-dir: public_html/
          dangerous-clean-slate: true
